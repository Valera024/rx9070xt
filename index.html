<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Купити відеокарту</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
            color: white;
        }

        /* декоративні світіння */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }

        body::before {
            background: #00f0ff;
            top: 10%;
            left: 10%;
        }

        body::after {
            background: #ff00c8;
            bottom: 10%;
            right: 10%;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 320px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .price {
            font-size: 28px;
            margin-bottom: 20px;
            color: #00ffcc;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00f0ff, #ff00c8);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00f0ff;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://cdn.comfy.ua//media/catalog/product/r/x/rx9070xt-16g-e-oc-bp-570280-2247181_1_.jpg" alt="Відеокарта">
    <div class="price">₴649 999</div>
    <button class="btn">Купити</button>
</div>

</body>
</html>
